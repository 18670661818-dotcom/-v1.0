version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: kitchen_ai_postgres
    environment:
      POSTGRES_DB: kitchen_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kitchen_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: kitchen_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kitchen_ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchen_ai_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/kitchen_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kitchen_ai_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 前端开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kitchen_ai_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - kitchen_ai_network
    command: npm start

  # 推理引擎服务
  inference-engine:
    build:
      context: ./backend/engine
      dockerfile: Dockerfile
    container_name: kitchen_ai_inference
    environment:
      MODEL_PATH: /models/model.pt
      INFERENCE_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./models:/models
    depends_on:
      - backend
    networks:
      - kitchen_ai_network
    command: python inference_server.py

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: kitchen_ai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - kitchen_ai_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

networks:
  kitchen_ai_network:
    driver: bridge